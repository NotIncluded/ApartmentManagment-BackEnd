name: CD - Build & Deploy

on:
  push:
    branches: ["dev"]

env:
  REGISTRY: ghcr.io

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod

    permissions:
      contents: read
      packages: write

    steps:
      # 📥 Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # 🔐 Login to GHCR
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 🧠 Set lowercase image name
      - name: Set image name
        run: |
          echo "IMAGE=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      # 🐳 Build image
      - name: Build image
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE }}:latest .

      # 📤 Push image
      - name: Push image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE }}:latest

      # 🔐 Setup SSH key (FIXED SAFE VERSION)
      - name: Setup SSH key
        run: |
          printf "%s" "${{ secrets.SSH_PRIVATE_KEY_B64 }}" | base64 -d > key
          chmod 600 key

      # 🚀 Deploy
      - name: Deploy via SSH
        run: |
          ssh -i key -o StrictHostKeyChecking=no ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }} << EOF

            set -e

            cd /app

            echo "📦 Pulling latest image..."
            docker pull ghcr.io/${{ env.IMAGE }}:latest

            echo "🧱 Running migrations..."
            docker compose -f docker-compose.prod.yml run --rm migrate

            echo "🔄 Restarting app..."
            docker compose -f docker-compose.prod.yml up -d

            echo "🧹 Cleaning old images..."
            docker image prune -f

            echo "✅ Deployment complete"

          EOF