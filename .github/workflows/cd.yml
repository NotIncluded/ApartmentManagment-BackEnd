name: CD - Build & Deploy

on:
  push:
    branches: ["dev"]

env:
  REGISTRY: ghcr.io
  IMAGE: ${{ github.repository }}

jobs:

  # 🐳 1. BUILD & PUSH
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.image.outputs.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        id: image
        run: |
          IMAGE_NAME=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "name=$IMAGE_NAME" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:latest .

      - name: Push image
        run: |
          docker push ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:latest


  # 🔐 2. PREPARE SSH
  ssh:
    runs-on: ubuntu-latest
    needs: build

    outputs:
      image: ${{ needs.build.outputs.image }}

    steps:
      - name: Setup SSH key
        run: |
          printf "%s" "${{ secrets.SSH_PRIVATE_KEY_B64 }}" | base64 -d > key
          chmod 600 key

      - name: Save key artifact
        uses: actions/upload-artifact@v4
        with:
          name: ssh-key
          path: key


  # 🚀 3. DEPLOY
  deploy:
    runs-on: ubuntu-latest
    needs: [build, ssh]

    steps:
      - name: Download SSH key
        uses: actions/download-artifact@v4
        with:
          name: ssh-key

      - name: Deploy via SSH
        run: |
          ssh -i key -o StrictHostKeyChecking=no ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }} << EOF

            set -e

            cd /app

            echo "📦 Pulling image..."
            docker pull ghcr.io/${{ needs.build.outputs.image }}:latest

            echo "🧱 Running migrations..."
            docker compose -f docker-compose.prod.yml run --rm migrate

            echo "🔄 Restarting app..."
            docker compose -f docker-compose.prod.yml up -d

            echo "🧹 Cleaning old images..."
            docker image prune -f

            echo "✅ Done"

          EOF
