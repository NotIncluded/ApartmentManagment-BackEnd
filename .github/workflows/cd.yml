name: CD - Build & Deploy

on:
  push:
    branches: ["dev"]

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    environment: prod        # 👈 add this

    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.image.outputs.name }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image name
        id: image
        run: |
          IMAGE_NAME=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "name=$IMAGE_NAME" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:latest
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ github.sha }}


  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: prod        # 👈 add this

    steps:
      - name: Debug SSH key
        run: |
          echo "=== Raw secret (first 50 chars) ==="
          printf "%s" "${{ secrets.SSH_PRIVATE_KEY }}" | head -c 50
          echo ""

      - name: Setup SSH key
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > key
          chmod 600 key
          cat key

      - name: Deploy
        run: |
          IMAGE=$(echo "${{ needs.build.outputs.image }}" | tr '[:upper:]' '[:lower:]')

          ssh -i key -o StrictHostKeyChecking=no ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }} << EOF
            set -e
            ls
            cd apartment-ooad/app/

            echo "📦 Pulling latest image..."
            docker pull ghcr.io/$IMAGE:latest
            
            echo this is image bro !!!! $IMAGE_NAME

            echo "🧱 Running migrations..."
            docker compose -f docker-compose.prod.yml run --rm migrate

            echo "🔄 Restarting app..."
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            echo "🧹 Cleaning old images..."
            docker image prune -f

            echo "✅ Done"
          EOF

      - name: Cleanup SSH key
        if: always()
        run: rm -f key