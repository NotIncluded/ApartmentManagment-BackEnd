version: "3.8"

services:
  db:
    image: postgres:16
    container_name: apartment_db
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - apartment_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d apartment"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build: .
    container_name: apartment_migrate
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - apartment_network
    restart: "no"
    command: ["./main", "-e", "local", "--setup=true"]

  app:
    build: .
    container_name: apartment_app
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - apartment_network
    command: ["./main", "-e", "local"]

networks:
  apartment_network:
    driver: bridge

volumes:
  db_data: